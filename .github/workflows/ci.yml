name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Formatting ────────────────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ── Lint ──────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy (macOS)
    runs-on: macos-26
    env:
      GRESIQ_API_KEY_DEV: ${{ secrets.GRESIQ_API_KEY_DEV }}
      GRESIQ_API_SECRET_DEV: ${{ secrets.GRESIQ_API_SECRET_DEV }}
      GRESIQ_API_KEY_PRODUCTION: ${{ secrets.GRESIQ_API_KEY_PRODUCTION }}
      GRESIQ_API_SECRET_PRODUCTION: ${{ secrets.GRESIQ_API_SECRET_PRODUCTION }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  # ── Tests (macOS — the only platform where tests run natively) ────────────
  test:
    name: Test (macOS)
    runs-on: macos-26
    env:
      GRESIQ_API_KEY_DEV: ${{ secrets.GRESIQ_API_KEY_DEV }}
      GRESIQ_API_SECRET_DEV: ${{ secrets.GRESIQ_API_SECRET_DEV }}
      GRESIQ_API_KEY_PRODUCTION: ${{ secrets.GRESIQ_API_KEY_PRODUCTION }}
      GRESIQ_API_SECRET_PRODUCTION: ${{ secrets.GRESIQ_API_SECRET_PRODUCTION }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib

  # ── Cross-compile checks for Darwin platforms (highest priority) ─────────
  check-macos-arm64:
    name: Check (macOS arm64)
    runs-on: macos-26
    env:
      GRESIQ_API_KEY_DEV: ${{ secrets.GRESIQ_API_KEY_DEV }}
      GRESIQ_API_SECRET_DEV: ${{ secrets.GRESIQ_API_SECRET_DEV }}
      GRESIQ_API_KEY_PRODUCTION: ${{ secrets.GRESIQ_API_KEY_PRODUCTION }}
      GRESIQ_API_SECRET_PRODUCTION: ${{ secrets.GRESIQ_API_SECRET_PRODUCTION }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-arm64
      - run: cargo check --target aarch64-apple-darwin

  check-macos-intel:
    name: Check (macOS x86_64)
    runs-on: macos-26
    env:
      GRESIQ_API_KEY_DEV: ${{ secrets.GRESIQ_API_KEY_DEV }}
      GRESIQ_API_SECRET_DEV: ${{ secrets.GRESIQ_API_SECRET_DEV }}
      GRESIQ_API_KEY_PRODUCTION: ${{ secrets.GRESIQ_API_KEY_PRODUCTION }}
      GRESIQ_API_SECRET_PRODUCTION: ${{ secrets.GRESIQ_API_SECRET_PRODUCTION }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-intel
      - run: cargo check --target x86_64-apple-darwin

  check-ios:
    name: Check (iOS device)
    runs-on: macos-26
    env:
      GRESIQ_API_KEY_DEV: ${{ secrets.GRESIQ_API_KEY_DEV }}
      GRESIQ_API_SECRET_DEV: ${{ secrets.GRESIQ_API_SECRET_DEV }}
      GRESIQ_API_KEY_PRODUCTION: ${{ secrets.GRESIQ_API_KEY_PRODUCTION }}
      GRESIQ_API_SECRET_PRODUCTION: ${{ secrets.GRESIQ_API_SECRET_PRODUCTION }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios
      - uses: Swatinem/rust-cache@v2
        with:
          key: ios
      - run: cargo check --target aarch64-apple-ios

  check-ios-sim:
    name: Check (iOS simulator)
    runs-on: macos-26
    env:
      GRESIQ_API_KEY_DEV: ${{ secrets.GRESIQ_API_KEY_DEV }}
      GRESIQ_API_SECRET_DEV: ${{ secrets.GRESIQ_API_SECRET_DEV }}
      GRESIQ_API_KEY_PRODUCTION: ${{ secrets.GRESIQ_API_KEY_PRODUCTION }}
      GRESIQ_API_SECRET_PRODUCTION: ${{ secrets.GRESIQ_API_SECRET_PRODUCTION }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim
      - uses: Swatinem/rust-cache@v2
        with:
          key: ios-sim
      - run: cargo check --target aarch64-apple-ios-sim

  check-tvos:
    name: Check (tvOS device)
    runs-on: macos-26
    env:
      GRESIQ_API_KEY_DEV: ${{ secrets.GRESIQ_API_KEY_DEV }}
      GRESIQ_API_SECRET_DEV: ${{ secrets.GRESIQ_API_SECRET_DEV }}
      GRESIQ_API_KEY_PRODUCTION: ${{ secrets.GRESIQ_API_KEY_PRODUCTION }}
      GRESIQ_API_SECRET_PRODUCTION: ${{ secrets.GRESIQ_API_SECRET_PRODUCTION }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          key: tvos
      - run: cargo +nightly check -Z build-std --target aarch64-apple-tvos

  check-tvos-sim:
    name: Check (tvOS simulator)
    runs-on: macos-26
    env:
      GRESIQ_API_KEY_DEV: ${{ secrets.GRESIQ_API_KEY_DEV }}
      GRESIQ_API_SECRET_DEV: ${{ secrets.GRESIQ_API_SECRET_DEV }}
      GRESIQ_API_KEY_PRODUCTION: ${{ secrets.GRESIQ_API_KEY_PRODUCTION }}
      GRESIQ_API_SECRET_PRODUCTION: ${{ secrets.GRESIQ_API_SECRET_PRODUCTION }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          key: tvos-sim
      - run: cargo +nightly check -Z build-std --target aarch64-apple-tvos-sim

  check-visionos:
    name: Check (visionOS device)
    runs-on: macos-26
    env:
      GRESIQ_API_KEY_DEV: ${{ secrets.GRESIQ_API_KEY_DEV }}
      GRESIQ_API_SECRET_DEV: ${{ secrets.GRESIQ_API_SECRET_DEV }}
      GRESIQ_API_KEY_PRODUCTION: ${{ secrets.GRESIQ_API_KEY_PRODUCTION }}
      GRESIQ_API_SECRET_PRODUCTION: ${{ secrets.GRESIQ_API_SECRET_PRODUCTION }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          key: visionos
      - run: cargo +nightly check -Z build-std --target aarch64-apple-visionos

  check-visionos-sim:
    name: Check (visionOS simulator)
    runs-on: macos-26
    env:
      GRESIQ_API_KEY_DEV: ${{ secrets.GRESIQ_API_KEY_DEV }}
      GRESIQ_API_SECRET_DEV: ${{ secrets.GRESIQ_API_SECRET_DEV }}
      GRESIQ_API_KEY_PRODUCTION: ${{ secrets.GRESIQ_API_KEY_PRODUCTION }}
      GRESIQ_API_SECRET_PRODUCTION: ${{ secrets.GRESIQ_API_SECRET_PRODUCTION }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          key: visionos-sim
      - run: cargo +nightly check -Z build-std --target aarch64-apple-visionos-sim

  check-watchos:
    name: Check (watchOS device)
    runs-on: macos-26
    env:
      GRESIQ_API_KEY_DEV: ${{ secrets.GRESIQ_API_KEY_DEV }}
      GRESIQ_API_SECRET_DEV: ${{ secrets.GRESIQ_API_SECRET_DEV }}
      GRESIQ_API_KEY_PRODUCTION: ${{ secrets.GRESIQ_API_KEY_PRODUCTION }}
      GRESIQ_API_SECRET_PRODUCTION: ${{ secrets.GRESIQ_API_SECRET_PRODUCTION }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          key: watchos
      - run: cargo +nightly check -Z build-std --target aarch64-apple-watchos

  check-watchos-sim:
    name: Check (watchOS simulator)
    runs-on: macos-26
    env:
      GRESIQ_API_KEY_DEV: ${{ secrets.GRESIQ_API_KEY_DEV }}
      GRESIQ_API_SECRET_DEV: ${{ secrets.GRESIQ_API_SECRET_DEV }}
      GRESIQ_API_KEY_PRODUCTION: ${{ secrets.GRESIQ_API_KEY_PRODUCTION }}
      GRESIQ_API_SECRET_PRODUCTION: ${{ secrets.GRESIQ_API_SECRET_PRODUCTION }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          key: watchos-sim
      - run: cargo +nightly check -Z build-std --target aarch64-apple-watchos-sim

  # ── Cross-compile checks for Unix-family platforms ────────────────────────
  check-linux:
    name: Check (Linux x86_64)
    runs-on: ubuntu-latest
    env:
      GRESIQ_API_KEY_DEV: ${{ secrets.GRESIQ_API_KEY_DEV }}
      GRESIQ_API_SECRET_DEV: ${{ secrets.GRESIQ_API_SECRET_DEV }}
      GRESIQ_API_KEY_PRODUCTION: ${{ secrets.GRESIQ_API_KEY_PRODUCTION }}
      GRESIQ_API_SECRET_PRODUCTION: ${{ secrets.GRESIQ_API_SECRET_PRODUCTION }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-x86_64
      - run: cargo check --target x86_64-unknown-linux-gnu

  check-android:
    name: Check (Android arm64)
    runs-on: ubuntu-latest
    env:
      GRESIQ_API_KEY_DEV: ${{ secrets.GRESIQ_API_KEY_DEV }}
      GRESIQ_API_SECRET_DEV: ${{ secrets.GRESIQ_API_SECRET_DEV }}
      GRESIQ_API_KEY_PRODUCTION: ${{ secrets.GRESIQ_API_KEY_PRODUCTION }}
      GRESIQ_API_SECRET_PRODUCTION: ${{ secrets.GRESIQ_API_SECRET_PRODUCTION }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: aarch64-linux-android34-clang
      CC_aarch64_linux_android: aarch64-linux-android34-clang
      AR_aarch64_linux_android: llvm-ar
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: android-actions/setup-android@v4
      - name: Configure Android NDK toolchain
        shell: bash
        run: |
          echo "${ANDROID_NDK_LATEST_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
        with:
          key: android-arm64
      - run: cargo check --target aarch64-linux-android

  # ── Cross-compile checks for Windows (lowest priority) ────────────────────
  check-windows:
    name: Check (Windows x86_64)
    runs-on: windows-latest
    env:
      GRESIQ_API_KEY_DEV: ${{ secrets.GRESIQ_API_KEY_DEV }}
      GRESIQ_API_SECRET_DEV: ${{ secrets.GRESIQ_API_SECRET_DEV }}
      GRESIQ_API_KEY_PRODUCTION: ${{ secrets.GRESIQ_API_KEY_PRODUCTION }}
      GRESIQ_API_SECRET_PRODUCTION: ${{ secrets.GRESIQ_API_SECRET_PRODUCTION }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-x86_64
      - run: cargo check --target x86_64-pc-windows-msvc

  # ── SDK bridge regression checks ─────────────────────────────────────────
  #
  # Check that SDK wrapper crates still compile against the core onde crate.
  # Without these, you can add a field to GgufModelConfig and not notice the
  # Dart bridge is broken until release day.

  check-sdk-bridges:
    name: Check SDK (${{ matrix.sdk }} bridge)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sdk: Dart
            path: sdk/dart/rust
            cache-key: sdk-dart
          - sdk: React Native
            path: sdk/react-native/rust
            cache-key: sdk-react-native
    env:
      GRESIQ_API_KEY_DEV: ${{ secrets.GRESIQ_API_KEY_DEV }}
      GRESIQ_API_SECRET_DEV: ${{ secrets.GRESIQ_API_SECRET_DEV }}
      GRESIQ_API_KEY_PRODUCTION: ${{ secrets.GRESIQ_API_KEY_PRODUCTION }}
      GRESIQ_API_SECRET_PRODUCTION: ${{ secrets.GRESIQ_API_SECRET_PRODUCTION }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.cache-key }}
          workspaces: "${{ matrix.path }} -> target"
      - name: cargo check (${{ matrix.sdk }} bridge)
        run: cargo check --manifest-path ${{ matrix.path }}/Cargo.toml

  check-sdk-kotlin-c-api:
    name: Check SDK Kotlin (C header sync)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify C header covers all Rust C API functions
        shell: bash
        run: |
          set -euo pipefail

          RUST_SRC="src/ffi/c_api.rs"
          HEADER="sdk/kotlin/lib/src/nativeInterop/cinterop/onde_c_api.h"

          # Extract #[no_mangle] extern "C" function names from Rust source.
          # Matches both `pub extern "C" fn name(` and `pub unsafe extern "C" fn name(`
          rust_fns=$(grep -E 'pub\s+(unsafe\s+)?extern\s+"C"\s+fn\s+' "$RUST_SRC" \
            | sed -E 's/.*fn ([a-zA-Z_][a-zA-Z0-9_]*).*/\1/' \
            | sort -u)

          # Extract onde_* function names from the C header (skip comments and typedefs).
          header_fns=$(grep -v '^\s*//' "$HEADER" \
            | grep -v typedef \
            | grep -oE 'onde_[a-zA-Z0-9_]+' \
            | sort -u)

          echo "=== Rust C API ($(echo "$rust_fns" | wc -l | tr -d ' ') functions) ==="
          echo "$rust_fns"
          echo ""
          echo "=== C header ($(echo "$header_fns" | wc -l | tr -d ' ') functions) ==="
          echo "$header_fns"
          echo ""

          missing=$(comm -23 <(echo "$rust_fns") <(echo "$header_fns") || true)
          extra=$(comm -13 <(echo "$rust_fns") <(echo "$header_fns") || true)

          rc=0

          if [[ -n "$missing" ]]; then
            echo "::error file=$HEADER::Functions exported in Rust but MISSING from C header: $(echo $missing | tr '\n' ' ')"
            echo "$missing"
            rc=1
          fi

          if [[ -n "$extra" ]]; then
            echo "::warning file=$HEADER::Functions in C header but NOT in Rust (possibly stale): $(echo $extra | tr '\n' ' ')"
            echo "$extra"
          fi

          if [[ $rc -eq 0 ]]; then
            echo "✅ C header is in sync with Rust C API."
          else
            echo ""
            echo "Fix: update $HEADER to match $RUST_SRC"
            exit 1
          fi

  check-sdk-kotlin-gradle:
    name: Check SDK Kotlin (Gradle config)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21
      # The wrapper JAR is gitignored in sdk/kotlin/, so install Gradle directly.
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      # Runs the Gradle configuration phase (targets, source sets, deps).
      # No compilation, no native libs, no NDK needed.
      - name: Validate Gradle configuration
        working-directory: sdk/kotlin
        run: gradle :lib:dependencies --no-daemon
