name: Build Swift XCFramework

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-swift-xcframework:
    runs-on: macos-15

    steps:
      - name: Checkout onde
        uses: actions/checkout@v6

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,aarch64-apple-darwin

      # tvOS targets are tier-3 — no prebuilt std libs available via rustup.
      # The build script uses `cargo +nightly -Z build-std` which compiles std
      # from source using the rust-src component. Do NOT list tvOS in targets:.
      - name: Install nightly Rust toolchain for tvOS
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Verify Xcode
        run: xcodebuild -version

      - name: Build Swift XCFramework
        run: .github/scripts/build-swift-xcframework.sh

      # ── Read build outputs ────────────────────────────────────────────────

      - name: Read version and checksum
        id: meta
        run: |
          VERSION=$(cat dist/swift/version.txt)
          CHECKSUM=$(cat dist/swift/OndeFramework.checksum.txt)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"

      # ── Validate release tag matches Cargo.toml version ─────────────────

      - name: Validate version consistency
        if: github.event_name == 'release'
        env:
          CARGO_VERSION: ${{ steps.meta.outputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          # Strip optional 'v' prefix from the release tag for comparison.
          NORMALIZED_TAG="${RELEASE_TAG#v}"
          if [ "$NORMALIZED_TAG" != "$CARGO_VERSION" ]; then
            echo "::error::Release tag '$RELEASE_TAG' (normalized: '$NORMALIZED_TAG') does not match Cargo.toml version '$CARGO_VERSION'. Update Cargo.toml or re-tag the release."
            exit 1
          fi
          echo "Version check passed: $CARGO_VERSION"

      # ── Upload CI artifacts (every run) ──────────────────────────────────

      - name: Upload XCFramework artifacts
        uses: actions/upload-artifact@v7
        with:
          name: onde-swift-xcframework
          path: |
            dist/swift/OndeFramework.xcframework.zip
            dist/swift/OndeFramework.checksum.txt
            dist/swift/version.txt
            dist/swift/Package/Sources/Onde/onde.swift
          if-no-files-found: error

      # ── Attach assets to the GitHub Release (release trigger only) ───────

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/swift/OndeFramework.xcframework.zip
            dist/swift/OndeFramework.checksum.txt

      # ── Update onde-swift and push a matching tag (release trigger only) ─

      - name: Checkout onde-swift
        if: github.event_name == 'release'
        uses: actions/checkout@v6
        with:
          repository: ondeinference/onde-swift
          # A PAT with `contents: write` on the onde-swift repo.
          # Create it at https://github.com/settings/tokens and store as
          # a repository secret named ONDE_SWIFT_PAT on the onde repo.
          token: ${{ secrets.ONDE_SWIFT_PAT }}
          path: onde-swift

      - name: Rewrite Package.swift with release URL and checksum
        if: github.event_name == 'release'
        env:
          CHECKSUM: ${{ steps.meta.outputs.checksum }}
          # Use the actual GitHub release tag for the download URL — this is
          # what GitHub uses to construct the asset download path.
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/OndeFramework.xcframework.zip
        run: |
          python3 - <<'PY'
          import os, re, pathlib

          pkg = pathlib.Path("onde-swift/Package.swift")
          src = pkg.read_text()

          url      = os.environ["RELEASE_URL"]
          checksum = os.environ["CHECKSUM"].strip()

          # Replace any existing binaryTarget block (path: or url: form).
          # The pattern matches from .binaryTarget( up to the closing ),
          # anchored on the OndeFramework name so we don't touch other targets.
          pattern = re.compile(
              r'\.binaryTarget\(\s*name:\s*"OndeFramework".*?\)',
              re.DOTALL,
          )

          replacement = (
              '.binaryTarget(\n'
              '            name: "OndeFramework",\n'
              f'            url: "{url}",\n'
              f'            checksum: "{checksum}"\n'
              '        )'
          )

          updated = pattern.sub(replacement, src)
          if updated == src:
              raise RuntimeError("binaryTarget pattern did not match — check Package.swift format")

          pkg.write_text(updated)
          print("Package.swift updated:")
          print(updated)
          PY

      - name: Copy generated onde.swift into onde-swift
        if: github.event_name == 'release'
        run: |
          cp dist/swift/Package/Sources/Onde/onde.swift \
             onde-swift/Sources/Onde/onde.swift

      - name: Commit and tag onde-swift
        if: github.event_name == 'release'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          cd onde-swift
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift Sources/Onde/onde.swift

          # Idempotent: skip commit if nothing changed (safe re-run).
          if git diff --cached --quiet; then
            echo "No changes to commit — Package.swift and onde.swift are already up to date."
          else
            git commit -m "Release $VERSION"
          fi

          # Create or move the version tag to this commit.
          # --force handles re-runs where the tag already exists.
          git tag -f "$VERSION"

          # Push to the default branch explicitly (checkout is detached HEAD).
          git push origin HEAD:main
          git push origin "$VERSION" --force
