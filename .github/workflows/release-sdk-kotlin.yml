name: Release Kotlin SDK to Maven Central

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.3)'
        required: true
        type: string

jobs:
  publish:
    name: Build and publish AAR to Maven Central
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          build-root-directory: sdk/kotlin

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android,
            i686-linux-android

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: rust-android-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'src/**/*.rs') }}
          restore-keys: rust-android-

      - name: Cache NDK
        uses: actions/cache@v4
        id: ndk-cache
        with:
          path: ${{ runner.tool_cache }}/ndk
          key: ndk-26.1.10909125

      - name: Install Android NDK
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: |
          ANDROID_SDK_ROOT="$ANDROID_SDK_ROOT"
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;26.1.10909125"

      - name: Set ANDROID_NDK_HOME
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Rust .so files for all Android ABIs
        run: |
          chmod +x sdk/kotlin/scripts/build-android.sh
          sdk/kotlin/scripts/build-android.sh --release

      - name: Build uniffi-bindgen
        run: cargo build --manifest-path uniffi-bindgen/Cargo.toml --release

      - name: Generate Kotlin UniFFI bindings
        run: |
          chmod +x sdk/kotlin/scripts/generate-bindings.sh
          sdk/kotlin/scripts/generate-bindings.sh

      - name: Verify generated bindings exist
        run: |
          ls -lh sdk/kotlin/lib/src/generated/kotlin/
          echo "JNI libs:"
          find sdk/kotlin/lib/src/main/jniLibs -name "*.so" | sort

      - name: Validate version matches Cargo.toml
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG_VERSION="${{ steps.version.outputs.version }}"
          echo "Cargo.toml version: $CARGO_VERSION"
          echo "Tag/input version:  $TAG_VERSION"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: version mismatch — bump Cargo.toml before tagging."
            exit 1
          fi

      - name: Update VERSION_NAME in gradle.properties
        run: |
          sed -i "s/^VERSION_NAME=.*/VERSION_NAME=${{ steps.version.outputs.version }}/" \
            sdk/kotlin/gradle.properties

      - name: Publish AAR to Maven Central
        working-directory: sdk/kotlin
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKeyId:         ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingKey:           ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword:      ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew :lib:publishAndReleaseToMavenCentral --no-configuration-cache

      - name: Collect AAR artifact
        run: |
          find sdk/kotlin/lib/build/outputs/aar -name "*.aar" | sort
          mkdir -p dist/kotlin
          cp sdk/kotlin/lib/build/outputs/aar/*.aar dist/kotlin/

      - name: Upload AAR as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: onde-inference-${{ steps.version.outputs.version }}.aar
          path: dist/kotlin/*.aar
          retention-days: 90

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Kotlin SDK ${{ steps.version.outputs.version }}
          body: |
            ## Onde Inference Kotlin SDK ${{ steps.version.outputs.version }}

            ### Maven Central

            ```kotlin
            // build.gradle.kts
            dependencies {
                implementation("com.ondeinference:onde-inference:${{ steps.version.outputs.version }}")
            }
            ```

            ### What's included

            - Rust inference engine compiled for: `arm64-v8a`, `armeabi-v7a`, `x86_64`, `x86`
            - UniFFI-generated Kotlin bindings
            - Coroutine-first public API (`OndeInference`)
            - Flow-based token streaming

            See the [README](https://github.com/ondeinference/onde/tree/main/sdk/kotlin/README.md) for full usage docs.
          files: dist/kotlin/*.aar
          draft: false
          prerelease: false
